<h2>Portfolio Simulator</h2>

<input type="text" id="stockName" placeholder="Stock Name">

<input type="number" id="buyPrice" placeholder="Buy Price">

<input type="number" id="currentPrice" placeholder="Current Price">

<input type="number" id="quantity" placeholder="Quantity">

<button onclick="calculatePortfolio()">
Calculate
</button>

<div id="portfolioResult"></div>
<h2>My Watchlist</h2>

<input
type="text"
id="watchStock"
placeholder="Enter Stock Name">

<button onclick="addWatchlist()">
Add Stock
</button>

<ul id="watchlist"></ul>

<h2>Stock Chart</h2>

<div
class="tradingview-widget-container">

<div
id="tradingview_chart">
</div>

</div>
