<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TradeMind AI</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav>

<h1>📈 TradeMind AI</h1>

<p>AI Powered Stock Research Platform</p>

</nav>

<div class="container">

<!-- STOCK SEARCH -->

<section class="card">

  <section class="dashboard">

<div class="dashboard-card">
<h3>NIFTY 50</h3>
<p id="niftyValue">22,500</p>
</div>

<div class="dashboard-card">
<h3>SENSEX</h3>
<p id="sensexValue">74,000</p>
</div>

<div class="dashboard-card">
<h3>Portfolio Value</h3>
<p id="portfolioValue">₹0</p>
</div>

<div class="dashboard-card">
<h3>Watchlist Stocks</h3>
<p id="watchlistCount">0</p>
</div>

</section>

<h2>🔍 Stock Search</h2>

<input
type="text"
id="stockInput"
placeholder="Enter Stock Symbol (AAPL, TSLA, MSFT)">

<button onclick="searchStock()">
Search Stock
</button>

<div id="result"></div>

</section>

<!-- STOCK CHART -->

<section class="card">

  <section class="card">

<h2>🏢 Company Profile</h2>

<div id="companyProfile">

<p>Search a stock to view company details.</p>

</div>

</section>

<h2>📊 Live Stock Chart</h2>

<div id="tradingview_chart"></div>

</section>

<!-- PORTFOLIO SIMULATOR -->

<section class="card">

<h2>💼 Portfolio Simulator</h2>

<input
type="number"
id="buyPrice"
placeholder="Buy Price">

<input
type="number"
id="currentPrice"
placeholder="Current Price">

<input
type="number"
id="quantity"
placeholder="Quantity">

<button onclick="calculatePortfolio()">
Calculate Portfolio
</button>

<div id="portfolioResult"></div>

</section>

<!-- WATCHLIST -->

<section class="card">

<h2>⭐ My Watchlist</h2>

<input
type="text"
id="watchStock"
placeholder="Stock Symbol">

<button onclick="addWatchlist()">
Add To Watchlist
</button>

<ul id="watchlist"></ul>

</section>

</div>

<!-- TradingView -->

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

new TradingView.widget({

"width":"100%",

"height":500,

"symbol":"NASDAQ:AAPL",

"interval":"D",

"timezone":"Asia/Kolkata",

"theme":"dark",

"style":"1",

"locale":"en",

"toolbar_bg":"#111827",

"enable_publishing":false,

"container_id":"tradingview_chart"

});

</script>

<script src="script.js"></script>

</body>

</html>
