<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeMind AI</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://s3.tradingview.com/tv.js"></script>
</head>

<body>

    <header>
        <h1>📈 TradeMind AI</h1>
        <p>Stock Market Research Platform</p>
    </header>

    <!-- Dashboard -->

    <section class="dashboard">

        <div class="card">
            <h3>Portfolio Value</h3>
            <p id="portfolioValue">₹0</p>
        </div>

        <div class="card">
            <h3>Watchlist Stocks</h3>
            <p id="watchlistCount">0</p>
        </div>

    </section>

    <!-- Search -->

    <section class="box">

        <h2>Stock Search</h2>

        <input
            type="text"
            id="stockInput"
            placeholder="AAPL, TSLA, MSFT">

        <button onclick="searchStock()">
            Search
        </button>

        <div id="result"></div>

    </section>

    <!-- Chart -->

    <section class="box">

        <h2>Stock Chart</h2>

        <div id="tradingview_chart"></div>

    </section>

    <!-- Company Profile -->

    <section class="box">

        <h2>Company Profile</h2>

        <div id="companyProfile">

            Search a stock to view details.

        </div>

    </section>

    <!-- Portfolio -->

    <section class="box">

        <h2>Portfolio Simulator</h2>

        <input
            type="number"
            id="buyPrice"
            placeholder="Buy Price">

        <input
            type="number"
            id="currentPrice"
            placeholder="Current Price">

        <input
            type="number"
            id="quantity"
            placeholder="Quantity">

        <button onclick="calculatePortfolio()">
            Calculate
        </button>

        <div id="portfolioResult"></div>

    </section>

    <!-- Watchlist -->

    <section class="box">

        <h2>Watchlist</h2>

        <input
            type="text"
            id="watchStock"
            placeholder="Stock Symbol">

        <button onclick="addWatchlist()">
            Add
        </button>

        <ul id="watchlist"></ul>

    </section>

    <script src="script.js"></script>

</body>

</html>
